name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'templates/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Enforce Cloud Run budget lock
        run: |
          if ! lock="$(gcloud secrets versions access latest --secret=cloud-run-budget-lock 2>/dev/null)"; then
            if gcloud secrets describe cloud-run-budget-lock >/dev/null 2>&1; then
              echo '::error::Cloud Run budget lock exists but could not be read.'
              exit 1
            fi
            echo '::warning::Cloud Run budget lock is not configured yet.'
            lock="open"
          fi
          if [[ "$lock" == locked:* ]]; then
            echo '::error::Cloud Run deployments are locked because monthly Cloud Run spend reached the $10 hard limit.'
            exit 1
          fi

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy firstresponder \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --cpu-throttling \
            --set-env-vars=GROQ_ZDR_CONFIRMED=true \
            --remove-secrets=MISTRAL_KEY \
            --update-secrets=GROQ_KEY=groq-key:latest,CEREBRAS_KEY=cerebras-key:latest \
            --quiet
