name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'tools_data.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'templates/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Enforce Cloud Run budget lock
        run: |
          if ! lock="$(gcloud secrets versions access latest --secret=cloud-run-budget-lock 2>/dev/null)"; then
            if gcloud secrets describe cloud-run-budget-lock >/dev/null 2>&1; then
              echo '::error::Cloud Run budget lock exists but could not be read.'
              exit 1
            fi
            echo '::warning::Cloud Run budget lock is not configured yet.'
            lock="open"
          fi
          if [[ "$lock" == locked:* ]]; then
            echo '::error::Cloud Run deployments are locked because monthly Cloud Run spend reached the $10 hard limit.'
            exit 1
          fi

      - name: Deploy to Cloud Run
        run: |
          GOOGLE_CLIENT_ID="$(gcloud run services describe freshskyai --region us-central1 --format=json | jq -r '.spec.template.spec.containers[0].env[] | select(.name == "GOOGLE_CLIENT_ID") | .value')"
          if [[ -z "$GOOGLE_CLIENT_ID" || "$GOOGLE_CLIENT_ID" == "null" ]]; then echo "::error::Shared Google client ID was not found."; exit 1; fi
          gcloud run deploy firstresponder \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --cpu-throttling \
            --update-env-vars=APP_URL=https://firstresponder.freshskyai.com,GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}",SESSION_COOKIE_SECURE=true,GOOGLE_CLOUD_PROJECT=neon-glyph-491500-e2,VERTEX_AI_ENABLED=true,VERTEX_AI_LOCATION=us-central1,VERTEX_AI_MODEL=gemini-2.5-flash-lite,LLM_PRIVACY_PROFILE=us_public,GROQ_ZDR_CONFIRMED=true,FRESHSKY_SUBSCRIPTIONS_ENABLED=true,FRESHSKY_SUBSCRIPTION_TIER=advanced,FRESHSKY_SUBSCRIPTION_PRICE_ID=price_1TwEqrCh3Z13FbXdY4LcX8yX,FRESHSKY_SUBSCRIPTION_AMOUNT_CENTS=2999,FRESHSKY_FREE_REQUEST_LIMIT=3 \
            --remove-secrets=MISTRAL_KEY \
            --update-secrets=SECRET_KEY=app-secret-key:latest,GOOGLE_CLIENT_SECRET=google-oauth-client-secret:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,GROQ_KEY=groq-key:latest,CEREBRAS_KEY=cerebras-key:latest \
            --quiet
